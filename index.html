<!DOCTYPE html>
<html lang="de">
<head>

    <style>
        body {
            font-family: Arial, sans-serif;

        }
        .bildbox img {

        }
        .bildbox p {

            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Rocco & Chantal</h1>

    <div class="bildbox">
        <img src="Bilder/Abalone spielen wir.jpg" alt="Abalone spielen wir">

    </div>

    <div class="bildbox">
        <img src="Bilder/Am liebsten bin ich glücklich.jpeg" alt="Am liebsten bin ich glücklich">
        <p>Am liebsten bin ich glücklich</p>
    </div>

    <div class="bildbox">
        <img src="Bilder/Baby Nimm mich.jpg" alt="Baby Nimm mich">
        <p>Baby Nimm mich</p>
    </div>

</body>
</html>
